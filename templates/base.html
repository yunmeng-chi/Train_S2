<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}用户管理系统{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">用户管理系统</div>
        <div class="navbar-menu">
            {% if session.username %}
                <span class="navbar-welcome">欢迎，{{ session.username }}</span>
                <a href="/search?keyword=" class="navbar-link" onclick="event.preventDefault();var k=prompt('请输入搜索关键词');if(k)location.href='/search?keyword='+encodeURIComponent(k)">搜索</a>
                <a href="/logout" class="navbar-link">退出</a>
            {% else %}
                <a href="/login" class="navbar-link">登录</a>
                <a href="/register" class="navbar-link">注册</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
