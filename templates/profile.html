{% extends "base.html" %}

{% block title %}个人中心{% endblock %}

{% block content %}
<div class="card">
    <h2 class="card-title">个人中心</h2>
    <ul class="user-info-list">
        <li><span class="info-label">ID：</span>{{ user.id }}</li>
        <li><span class="info-label">用户名：</span>{{ user.username }}</li>
        <li><span class="info-label">邮　箱：</span>{{ user.email }}</li>
        <li><span class="info-label">手　机：</span>{{ user.phone }}</li>
        <li><span class="info-label">余　额：</span>{{ user.balance }}</li>
    </ul>
</div>

<div class="card">
    <h2 class="card-title">充值</h2>
    <form method="post" action="/recharge" class="recharge-form">
        <div class="form-group">
            <label for="amount">充值金额：</label>
            <input type="number" id="amount" name="amount" class="form-input" step="0.01" required>
        </div>
        <button type="submit" class="btn btn-primary">充值</button>
    </form>
</div>

<p style="text-align:center;margin-top:16px"><a href="/" style="color:#667eea;text-decoration:underline">返回至首页</a></p>
{% endblock %}
